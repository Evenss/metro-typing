name: Build Next.js static export

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy the static export to GitHub Pages
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: read
      pages: write
      id-token: write
    outputs:
      pages_available: ${{ steps.pages.outputs.available }}
      should_deploy: ${{ steps.deploy-check.outputs.should_deploy }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Check Pages availability
        id: pages
        if: ${{ github.event_name == 'push' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          status=$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/pages")
          if [ "$status" = "200" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is not enabled for this repository; skipping Pages deployment."
          fi
      - name: Decide whether to deploy
        id: deploy-check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.deploy }}" = "true" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ steps.pages.outputs.available }}" = "true" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup Pages
        if: ${{ steps.deploy-check.outputs.should_deploy == 'true' }}
        uses: actions/configure-pages@v5
      - name: Install dependencies
        run: npm ci
      - name: Build static export
        env:
          PAGES_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: npm run build
      - name: Upload artifact
        if: ${{ steps.deploy-check.outputs.should_deploy == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: out

  deploy:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy) }}
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Skip deployment
        if: ${{ needs.build.outputs.should_deploy != 'true' }}
        run: echo "GitHub Pages is not enabled for this repository; deployment was skipped."
      - name: Deploy to GitHub Pages
        if: ${{ needs.build.outputs.should_deploy == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v5
